name: Deploy Licitacoes Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'

jobs:
  deploy:
    name: Deploy Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests azure-storage-blob databricks-cli

      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host = https://adb-7405608954459582.2.azuredatabricks.net
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      - name: Upload notebook to Databricks
        run: |
          databricks workspace import --language PYTHON --overwrite pipeline/transform/transform_databricks.py /licitacoes/transform_licitacoes

      - name: Run extraction
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
        run: python pipeline/extract/extract.py

      - name: Done
        run: echo "Deploy concluido!"
